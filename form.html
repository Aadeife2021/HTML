<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Forms</title>
</head>
<body>
    <form action="" method="">
<!-- Text -->
<label for="username">username:</label>
        <input id="username" placeholder="usename">
        <!-- email -->
         <label for="email">Email:</label>
        <input id="email" placeholder="email">
<!-- Password -->
 <label for="password">Password:</label>
        <input id="password" placeholder="password">
        <br> <br>
        <label for="text">Add coment:</label>
        <textarea name="" id="text" placeholder="Type here"></textarea>
        <hr>
        <!-- checkbox -->
         <label for="checkbox">checkbox:</label>
         <input id="checkbox" type="checkbox">
         <!-- Date -->
         <label for="Date">Date:</label>
         <input id="Date" type="Date">
         <!-- Time -->
         <label for="Time">Time:</label>
         <input id="Time" type="Time">
         <!--color  -->
         <label for="color">color:</label>
         <input id="color" type="color">
         <!-- File -->
          <label for="fileupload">Upload:</label>
         <input id="file" type="file">
         <!-- search -->
         <label for="search">search:</label>
         <input id="search" type="search">
         <!-- radio button -->
          <label for="radio-yes">Yes:</label>
          <input type="radio" name="choose" id="radio-yes">
          <label for="radio-no">no:</label>
          <input type="radio" name="choose" id="radio-no">
          <hr>
          <div>
            <!-- dropdown -->
             <label for="select">select your interest:</label>
            <select name="select" id="select">
                <option value="Food">Food</option>
                <option value="Clothe">Clothe</option>
                <option value="Money">Money</option>
                <option value="Girl" selected>Girl</option>
            </select>
          </div>
          <br>
          <!-- submit -->
           <input type="submit" value="click me">
           <!-- reset -->
            <input type="reset" value="reset">
    </form>
</body>
</html>
